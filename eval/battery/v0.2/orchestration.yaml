# Bateria de task.run (linea v0.2, ADR 0036). CRITERIO DE ACEPTACION escrito
# ANTES de implementar (fase v0.2-2 del PLAN). Se integra en eval.run en la
# fase v0.2-3; hasta entonces el runner no carga este archivo.
#
# Scripting determinista (world.script), realizado por ScriptedFakeAdapter en
# la implementacion:
# - plans: lista de planes que el fake planner devuelve en orden (uno por
#   re-planificacion). Cada plan es una lista de subtareas
#   {prompt, domain_hint (opcional), depends_on (opcional)}.
# - responses: respuesta fija por modelo fake worker/combiner.
# - evaluate_decisions: decision del EVALUATE por iteracion, en orden:
#   done | rerun | replan.
# - simulated: agotamiento simulado {elapsed_s | context_tokens} para cortes
#   de tiempo/contexto sin depender del reloj real.

- id: task_happy_path
  track: conformance
  description: "PLAN de 2 subtareas independientes, fan-out, COMBINE y task_done en la primera iteracion."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "analiza el problema y propon una funcion"
    identity: { user_id: u1, service: local_cli }
  world:
    script:
      plans:
        - - { prompt: "razona el enfoque", domain_hint: razonamiento }
          - { prompt: "escribe la funcion", domain_hint: codigo }
      responses:
        fake_reason: "ENFOQUE_OK"
        fake_code: "FUNCION_OK"
        fake_combiner: "COMBINADO_FINAL"
      evaluate_decisions: [done]
  expect:
    stop_reason: task_done
    response: "COMBINADO_FINAL"
    subtasks:
      - { domain: razonamiento, model: fake_reason }
      - { domain: codigo, model: fake_code }

- id: task_checkpoint_sequence
  track: conformance
  description: "El flujo emite los checkpoints D2 en orden (anclajes de conscience, ADR 0034/0036)."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "analiza el problema y propon una funcion"
    identity: { user_id: u1, service: local_cli }
  world:
    script:
      plans:
        - - { prompt: "razona el enfoque", domain_hint: razonamiento }
          - { prompt: "escribe la funcion", domain_hint: codigo }
      responses:
        fake_reason: "ENFOQUE_OK"
        fake_code: "FUNCION_OK"
        fake_combiner: "COMBINADO_FINAL"
      evaluate_decisions: [done]
  expect:
    checkpoints:
      - task_received
      - plan_ready
      - subtask_done
      - subtask_done
      - combine_ready
      - iteration_end
      - task_done

- id: task_subtask_routing
  track: conformance
  description: "Subtarea con domain_hint usa ese dominio; subtarea sin hint pasa por el router (keywords)."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "tarea mixta"
    identity: { user_id: u1, service: local_cli }
  world:
    script:
      plans:
        - - { prompt: "parte con hint", domain_hint: codigo }
          - { prompt: "razona esta parte sin hint" }
      responses:
        fake_code: "A"
        fake_reason: "B"
        fake_combiner: "AB"
      evaluate_decisions: [done]
  expect:
    stop_reason: task_done
    subtasks:
      - { domain: codigo, model: fake_code }
      - { domain: razonamiento, model: fake_reason }

- id: task_subtask_fallback
  track: conformance
  description: "Una subtarea cuyo preferido no esta disponible usa el fallback del dominio (ADR 0005) y registra la sustitucion."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "tarea con fallback"
    identity: { user_id: u1, service: local_cli }
  world:
    unavailable_models: [fake_code]
    script:
      plans:
        - - { prompt: "escribe la funcion", domain_hint: codigo }
      responses:
        fake_general: "FUNCION_FALLBACK"
        fake_combiner: "FINAL"
      evaluate_decisions: [done]
  expect:
    stop_reason: task_done
    subtasks:
      - { domain: codigo, model: fake_general, substituted: true }

- id: task_subtask_unavailable_error
  track: conformance
  description: "Si una subtarea agota preferido y fallbacks, la tarea corta con error tipado ModelUnavailable (v0.2 minimo: sin tolerancia parcial; el arbol registra la subtarea fallida)."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "tarea imposible"
    identity: { user_id: u1, service: local_cli }
  world:
    unavailable_models: [fake_reason]
    script:
      plans:
        - - { prompt: "razona", domain_hint: razonamiento }
  expect:
    error_type: ModelUnavailable

- id: task_stop_max_subtasks
  track: conformance
  description: "Un plan con mas subtareas que max_subtasks corta con stop tipado (no se trunca en silencio)."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "tarea enorme"
    identity: { user_id: u1, service: local_cli }
  world:
    script:
      plans:
        - - { prompt: "s1" }
          - { prompt: "s2" }
          - { prompt: "s3" }
          - { prompt: "s4" }
          - { prompt: "s5" }
  expect:
    stop_reason: max_subtasks

- id: task_stop_max_iterations
  track: conformance
  description: "EVALUATE pide rerun mas alla de max_iterations (2): corta con max_iterations y devuelve el mejor combinado."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "tarea insaciable"
    identity: { user_id: u1, service: local_cli }
  world:
    script:
      plans:
        - - { prompt: "s1", domain_hint: general }
      responses:
        fake_general: "PARCIAL"
        fake_combiner: "COMBINADO_PARCIAL"
      evaluate_decisions: [rerun, rerun]
  expect:
    stop_reason: max_iterations
    response: "COMBINADO_PARCIAL"

- id: task_replan_then_done
  track: conformance
  description: "EVALUATE pide una re-planificacion (dentro de max_replans=1); el segundo plan completa. plan_ready aparece dos veces."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "tarea con replanteo"
    identity: { user_id: u1, service: local_cli }
  world:
    script:
      plans:
        - - { prompt: "enfoque fallido", domain_hint: general }
        - - { prompt: "enfoque corregido", domain_hint: razonamiento }
      responses:
        fake_general: "MALO"
        fake_reason: "BUENO"
        fake_combiner: "FINAL_CORREGIDO"
      evaluate_decisions: [replan, done]
  expect:
    stop_reason: task_done
    response: "FINAL_CORREGIDO"
    checkpoint_counts:
      plan_ready: 2

- id: task_stop_max_replans
  track: conformance
  description: "EVALUATE pide re-planificar mas alla de max_replans (1): corta con stop tipado max_replans (enmienda ADR 0036)."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
