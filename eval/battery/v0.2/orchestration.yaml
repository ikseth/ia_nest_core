- id: task_identity_and_tree_in_trace
  track: conformance
  description: "Cada subtarea traza con la identidad del request, task_id comun y vinculo al request padre (ADR 0036)."
  capability: task.run
  fixture: eval/fixtures/orchestration.yaml
  input:
    prompt: "analiza el problema y propon una funcion"
    identity: { user_id: u42, service: local_cli, session_id: s7 }
  world:
    script:
      plans:
        - - { prompt: "razona", domain_hint: razonamiento }
          - { prompt: "codifica", domain_hint: codigo }
      responses:
        fake_reason: "A"
        fake_code: "B"
        fake_combiner: "AB"
      evaluate_decisions: [done]
  expect:
    subtask_trace_fields:
      user_id: u42
      service: local_cli
      session_id: s7
    subtask_traces_share_task_id: true
    subtask_traces_link_parent: true

- id: task_smoke_complex
  track: smoke
  description: "Tarea compleja real (razonar + codificar): el plan descompone y el combinado responde ambas partes."
  capability: task.run
  input:
    prompt: "Explica que es una criba de Eratostenes y escribe una funcion en Python que la implemente."
    identity: { user_id: local, service: local_cli }
  thresholds:
    must_be_nonempty: true
    min_chars: 200
    must_contain: [def]
    latency_ms_max: 180000
    stop_reason: task_done

- id: task_smoke_simple
  track: smoke
  description: "Tarea simple: el plan puede ser de una sola subtarea y completar rapido."
  capability: task.run
  input:
    prompt: "Resume en tres lineas que es un sistema operativo."
    identity: { user_id: local, service: local_cli }
  thresholds:
    must_be_nonempty: true
    min_chars: 60
    latency_ms_max: 60000
    stop_reason: task_done
